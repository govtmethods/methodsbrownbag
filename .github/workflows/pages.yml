name: Deploy book with GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"

      - name: Install system dependencies (R packages)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libwebp-dev

      - name: Restore R packages (renv)
        uses: r-lib/actions/setup-renv@v2

      - name: Install TinyTeX (for PDF)
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install common LaTeX packages
        run: |
          tlmgr install \
            latexmk \
            collection-fontsrecommended \
            xcolor \
            bookmark \
            ulem \
            fvextra \
            upquote || true

      - name: Render
        run: quarto render --no-clean

      - name: Copy PDF into _book
        run: |
          if [ -f "_book/Methods-Brown-Bag.pdf" ]; then
            echo "PDF already present in _book"
          elif [ -f "Methods-Brown-Bag.pdf" ]; then
            cp "Methods-Brown-Bag.pdf" "_book/Methods-Brown-Bag.pdf"
          else
            echo "PDF not found after render"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4