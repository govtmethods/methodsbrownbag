project:
  type: book
  output-dir: _book

book:
  title: "Methods Brown Bag"
  chapters:
    - index.qmd
    - chapters/01-intro.qmd
    - chapters/02-github.qmd
    - chapters/02-Under-Regression.qmd
    

format:
  html:
    theme: cosmo
    fig-path: "figures/html/"
    fig-format: png
    css: styles.scss
    toc: true
    toc-depth: 3
    code-fold: true
    code-overflow: wrap
    number-sections: false
    highlight-style: kate
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Libre+Caslon+Text:wght@400;600&display=swap" rel="stylesheet">

        <script>
          (function () {
            const KEY = "gm_theme";
            const root = document.documentElement;

            function getStoredTheme() {
              try {
                return localStorage.getItem(KEY);
              } catch (e) {
                return null;
              }
            }

            function setStoredTheme(value) {
              try {
                localStorage.setItem(KEY, value);
              } catch (e) {
                // no-op when localStorage is unavailable
              }
            }

            function applyTheme(value) {
              if (value === "dark") {
                root.setAttribute("data-theme", "dark");
                root.setAttribute("data-bs-theme", "dark");
              } else {
                root.removeAttribute("data-theme");
                root.setAttribute("data-bs-theme", "light");
              }
            }

            applyTheme(getStoredTheme() || "light");

            window.__gmToggleTheme = function () {
              const curr = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
              const next = curr === "dark" ? "light" : "dark";
              setStoredTheme(next);
              applyTheme(next);
            };
          })();
        </script>

    include-after-body:
      - _includes/gm-controls.html

  pdf:
    output-file: Methods-Brown-Bag.pdf
    toc: true
    code-fold: true
    code-overflow: wrap
    number-sections: false
    highlight-style: kate
    fig-path: "figures/pdf/"
    fig-format: pdf

execute:
  freeze: false

keep-md: true