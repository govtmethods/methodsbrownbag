project:
  type: book
  output-dir: _book
  post-render:
    - Rscript _scripts/build-chapter-meta.R

book:
  title: "Methods Brown Bag"
 # author:
 # - "Editors (2025-26)"
 # - "Sara Mohammadi(PhD $1^{st}$ Year)"
 # - "Parushya (PhD $4^{th}$ Year)"
  repo-url: https://github.com/govtmethods/methodsbrownbag
  repo-actions: [source, issue]
  chapters:
    - index.qmd
    - chapters/01-intro.qmd
    - chapters/02-github.qmd
    - chapters/03-network-analysis.qmd
    - chapters/04-Under-Regression.qmd
    - chapters/05-text-as-data.qmd
    - chapters/06-formal-logic.qmd
    - chapters/07-Vibe-coding.qmd
    - chapters/08-text-as-data-principles.qmd

format:
  html:
    theme: [journal, styles.scss]
    toc: true
    toc-depth: 3
    code-fold: true
    code-overflow: wrap
    number-sections: false
    highlight-style: kate
    fig-path: "figures/html/"
    fig-format: png
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Libre+Caslon+Text:wght@400;600&display=swap" rel="stylesheet">
        <script>
          // Theme: apply stored preference before first paint
          (function () {
            const KEY = "gm_theme";
            const root = document.documentElement;
            function applyTheme(v) {
              if (v === "dark") root.setAttribute("data-theme", "dark");
              else root.removeAttribute("data-theme");
            }
            applyTheme(localStorage.getItem(KEY) || "light");
            window.__gmToggleTheme = function () {
              const next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
              localStorage.setItem(KEY, next);
              applyTheme(next);
            };
          })();

          // chapters-meta: fetch and apply to sidebar + index listing
          (function () {
            function bookRoot() {
              // Derive book root from a known site_libs script path
              const s = document.querySelector('script[src*="site_libs"]');
              if (s) {
                const m = s.src.match(/(https?:\/\/[^/]+(?:\/[^/]+)*?)\/site_libs\//);
                if (m) return m[1];
              }
              // Fallback: strip /chapters/filename from current path
              const p = window.location.pathname;
              const idx = p.indexOf('/chapters/');
              return idx !== -1 ? window.location.origin + p.slice(0, idx) : window.location.origin + p.replace(/\/[^/]*$/, '');
            }

            document.addEventListener("DOMContentLoaded", function () {
              fetch(bookRoot() + "/chapters-meta.json")
                .then(r => r.json())
                .then(function (chapters) {

                  // ── Sidebar: append author below each chapter link ──────────
                  document.querySelectorAll("#quarto-sidebar .sidebar-link").forEach(function (link) {
                    const href = link.getAttribute("href") || "";
                    const match = chapters.find(function (c) {
                      return href.replace(/^\.\.\//, "").split("/").pop() === c.href.split("/").pop();
                    });
                    if (match && match.author) {
                      const tag = document.createElement("span");
                      tag.className = "gm-sidebar-author";
                      tag.textContent = match.author;
                      link.appendChild(tag);
                    }
                  });

                  // ── Index listing: render session cards ────────────────────
                  const container = document.getElementById("gm-session-list");
                  if (!container) return;
                  container.innerHTML = chapters.map(function (c, i) {
                    const kicker = "Session " + (i + 1) + (c.date ? " · " + c.date : "");
                    const author = c.author ? '<p class="gm-item-desc">' + c.author + "</p>" : "";
                    return '<a href="' + c.href + '" class="gm-item">' +
                      '<div class="gm-item-kicker">' + kicker + "</div>" +
                      '<div class="gm-item-title">' + c.title + "</div>" +
                      author +
                      "</a>";
                  }).join("");
                })
                .catch(function () {}); // silently fail if JSON not yet generated
            });
          })();

          // Mobile breadcrumb: show current chapter below collapsed navbar
          document.addEventListener("DOMContentLoaded", function () {
            const active = document.querySelector("#quarto-sidebar .sidebar-item-text.sidebar-link.active, #quarto-sidebar .active > .sidebar-item-text");
            if (!active) return;
            const label = document.createElement("div");
            label.id = "gm-chapter-label";
            label.textContent = active.textContent.trim();
            const header = document.getElementById("quarto-header");
            if (header) header.insertAdjacentElement("afterend", label);
          });
        </script>
    include-before-body:
      - _includes/gm-controls.html

  pdf:
    documentclass: report
    output-file: Methods-Brown-Bag.pdf
    toc: true
    toc-depth: 2
    code-fold: true
    code-overflow: wrap
    number-sections: false
    highlight-style: kate
    fig-path: "figures/pdf/"
    fig-format: pdf
    fontsize: 10pt
    linestretch: 1.15
    geometry: margin=1.1in
    include-in-header:
      text: |
        \usepackage{xcolor}
        \usepackage{float}
        \usepackage{fancyhdr}
        \fancypagestyle{plain}{%
          \fancyhf{}%
          \fancyfoot[L]{\small\color{gray}Rendered \today}%
          \fancyfoot[R]{\small\color{gray}\thepage}%
          \renewcommand{\headrulewidth}{0pt}%
          \renewcommand{\footrulewidth}{0pt}%
        }
        \pagestyle{fancy}
        \fancyhf{}
        \fancyhead[L]{\small\color{gray}\leftmark}
        \fancyhead[R]{\small\color{gray}\rightmark}
        \fancyfoot[L]{\small\color{gray}Rendered \today}
        \fancyfoot[R]{\small\color{gray}\thepage}
        \renewcommand{\headrulewidth}{0.3pt}
        \renewcommand{\headrule}{{\color{gray}\hrule width\headwidth height\headrulewidth \vskip-\headrulewidth}}
        \renewcommand{\footrulewidth}{0pt}
        \renewcommand{\chaptermark}[1]{\markboth{#1}{}}
        \renewcommand{\sectionmark}[1]{\markright{#1}}
        \usepackage{fvextra}
        \DefineVerbatimEnvironment{Highlighting}{Verbatim}{breaklines,breakanywhere,commandchars=\\\{\}}
        \RecustomVerbatimEnvironment{verbatim}{Verbatim}{breaklines,breakanywhere}
        \AtBeginDocument{\hypersetup{colorlinks=true,linkcolor=[RGB]{0,96,107},urlcolor=[RGB]{0,96,107},citecolor=[RGB]{0,96,107}}}
        \setkeys{Gin}{height=0.85\textheight,keepaspectratio}
        \newfontfamily\titlefont[BoldFont={TeX Gyre Heros Bold}]{TeX Gyre Heros}
        \renewcommand{\maketitle}{%
          \begin{titlepage}%
            \centering%
            \vspace*{3cm}%
            {\fontsize{52}{62}\selectfont\titlefont\bfseries\color[RGB]{0,96,107}Methods Brown Bag\par}%
            \vspace{0.25cm}%
            {\fontsize{14}{18}\selectfont\titlefont\color[RGB]{0,96,107}Compendium of Sessions\par}%
            \vspace{2.5cm}%
            {\normalsize\color{gray}Rendered \today\par}%
            \vspace{1.8cm}%
            {\large\itshape Editors\par}%
            \vspace{0.6cm}%
            {\large Parushya\\[0.3em]Sara Mohammadi\\[0.3em]Claude\par}%
            \vspace{2cm}%
            {\normalsize\href{https://govtmethods.github.io/}{govtmethods.github.io}\par}%
            \vfill%
          \end{titlepage}%
        }

